name: Deploy to Cloud Run

# Push to main -> Cloud Build builds the Dockerfile -> deploy to Cloud Run.
# Requires these repo secrets (set once during bootstrap):
#   GCP_PROJECT_ID  - the target Google Cloud project id
#   GCP_SA_KEY      - JSON key for the gh-deployer service account (see scripts/setup-gcp.sh)
#   DATABASE_URL    - Neon pooled connection string (?sslmode=require)
#   JWT_SECRET      - long random string (e.g. `openssl rand -hex 32`); set once, never rotate casually
#   ADMIN_EMAIL     - email of the bootstrap platform admin (your login)
#   ADMIN_PASSWORD  - password for that admin; the app sets/resets it on each boot
#   RESEND_API_KEY  - (optional) Resend API key — only for the dormant magic-link path
#   EMAIL_FROM      - (optional) sender for sign-in emails, e.g. `money·data <login@yourdomain.com>`
#   APP_BASE_URL    - canonical public URL, e.g. https://money-data-xxx.run.app
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Avoid overlapping deploys racing each other.
concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Diagnostic: confirms each secret actually resolves in this workflow.
      # Prints only lengths, never the values. Remove once auth is working.
      - name: Verify secrets are present
        env:
          SA_KEY: ${{ secrets.GCP_SA_KEY }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          DB: ${{ secrets.DATABASE_URL }}
          JWT: ${{ secrets.JWT_SECRET }}
        run: |
          check() { if [ -z "$2" ]; then echo "❌ $1 is EMPTY"; else echo "✅ $1 present (${#2} chars)"; fi; }
          check GCP_SA_KEY      "$SA_KEY"
          check GCP_PROJECT_ID  "$PROJECT"
          check DATABASE_URL    "$DB"
          check JWT_SECRET      "$JWT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy money-data \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region europe-west2 \
            --allow-unauthenticated \
            --min-instances 0 --max-instances 3 \
            --memory 512Mi --cpu 1 --port 8080 \
            --quiet \
            --set-env-vars "^@@^DATABASE_URL=${{ secrets.DATABASE_URL }}@@JWT_SECRET=${{ secrets.JWT_SECRET }}@@ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}@@ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}@@RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}@@EMAIL_FROM=${{ secrets.EMAIL_FROM }}@@APP_BASE_URL=${{ secrets.APP_BASE_URL }}"

      - name: Show service URL
        run: |
          gcloud run services describe money-data \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region europe-west2 \
            --format 'value(status.url)'
